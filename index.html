<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cyber Spider Shooter</title>
  <style>
    @font-face {
      font-family: "BoldPixels";
      src: url("assets/fonts/BoldPixels-v1.6-Font/BoldPixels.ttf") format("truetype");
      font-display: swap;
    }

    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap");

    :root {
      color-scheme: dark;
      --bg: #05070b;
      --panel: #0d121a;
      --panel-2: #151c27;
      --line: rgba(117, 162, 218, 0.32);
      --line-strong: rgba(104, 208, 255, 0.62);
      --text: #eef4ff;
      --muted: #98a8be;
      --accent: #68d0ff;
      --accent-2: #a1ff73;
      --shadow: rgba(0, 0, 0, 0.55);
      --app-viewport-width: 100vw;
      --app-viewport-height: 100vh;
      --menu-button-width: min(340px, calc(100vw - 32px));
      --menu-safe-top: 24px;
      --menu-safe-bottom: 24px;
      --menu-stack-gap: 34px;
      --menu-list-gap: 12px;
      --menu-logo-scale: 1;
      --menu-button-scale: 1;
      --overlay-padding-scale: 1;
      --overlay-gap-scale: 1;
      --overlay-button-scale: 1;
      --overlay-title-scale: 1;
      --shell-horizontal-margin: 24px;
      --shell-vertical-margin: 24px;
      --mobile-shell-active: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      position: relative;
      font-family: "Orbitron", "Rajdhani", "Bahnschrift", "Segoe UI Semibold", sans-serif;
      color: var(--text);
    }

    body.menu-screen {
      background:
        url("assets/ui/111.png") center center / cover no-repeat,
        var(--bg);
    }

    body.menu-screen::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(3, 6, 10, 0.28);
      pointer-events: none;
      z-index: 1;
    }

    canvas {
      display: block;
      position: fixed;
      left: 0;
      top: 0;
      background: #050510;
    }

    .ui-root {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 4;
    }

    .ui-root[hidden] {
      display: none !important;
    }

    .menu-buttons[hidden],
    .page-shell[hidden] {
      display: none !important;
    }

    .pause-overlay[hidden] {
      display: none !important;
    }

    .mobile-controls[hidden] {
      display: none !important;
    }

    .page-header[hidden] {
      display: none !important;
    }

    .menu-buttons,
    .page-shell {
      pointer-events: auto;
    }

    .mobile-controls {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .mobile-controls__joystick-zone,
    .mobile-controls__fire {
      pointer-events: auto;
      touch-action: none;
    }

    .mobile-controls__joystick-zone {
      position: absolute;
      right: 0;
      bottom: 0;
      width: min(46vw, 320px);
      height: min(42vh, 300px);
      overflow: visible;
    }

    .mobile-controls__joystick-base {
      position: absolute;
      width: 116px;
      height: 116px;
      margin-left: -58px;
      margin-top: -58px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.13);
      border: 2px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.24);
      left: calc(100% - max(84px, min(24vw, 112px)));
      top: calc(100% - max(84px, min(20vh, 112px)));
      opacity: 0.28;
      transition: opacity 90ms ease;
    }

    .mobile-controls__joystick-base.is-visible {
      opacity: 1;
    }

    .mobile-controls__joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      margin-left: -27px;
      margin-top: -27px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
      border: 2px solid rgba(255, 255, 255, 0.34);
      box-shadow: 0 0 14px rgba(0, 0, 0, 0.22);
      transform: translate(0, 0);
    }

    .mobile-controls__fire {
      position: absolute;
      left: max(18px, env(safe-area-inset-left));
      bottom: max(18px, env(safe-area-inset-bottom));
      width: clamp(88px, 18vw, 108px);
      height: clamp(88px, 18vw, 108px);
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.16);
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.22);
      color: rgba(255, 255, 255, 0.92);
      font-family: "BoldPixels", "Orbitron", "Rajdhani", sans-serif;
      font-size: clamp(18px, 3.8vw, 22px);
      letter-spacing: 0.08em;
      display: grid;
      place-items: center;
      text-transform: uppercase;
    }

    .mobile-controls__fire.is-active {
      background: rgba(255, 76, 76, 0.28);
      border-color: rgba(255, 112, 112, 0.42);
      color: #ffffff;
      box-shadow: 0 0 22px rgba(255, 64, 64, 0.2);
    }

    .menu-buttons {
      position: relative;
      width: min(calc(var(--app-viewport-width) - 32px), 92vw);
      max-height: var(--app-viewport-height);
      padding: var(--menu-safe-top) 0 var(--menu-safe-bottom);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--menu-stack-gap);
      z-index: 4;
    }

    .menu-brand {
      position: relative;
      width: min(calc(620px * var(--menu-logo-scale)), calc(var(--app-viewport-width) - 32px), 92vw);
      text-align: center;
      pointer-events: none;
      user-select: none;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.88);
    }

    .menu-brand__title {
      display: block;
      font-family: "BoldPixels", "Orbitron", "Rajdhani", sans-serif;
      font-size: calc(clamp(28px, 3.4vw, 48px) * var(--menu-logo-scale));
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .menu-brand__stars {
      font-family: "Orbitron", "Rajdhani", sans-serif;
      font-size: calc(clamp(12px, 1.35vw, 18px) * var(--menu-logo-scale));
      font-weight: 700;
      letter-spacing: 0.42em;
      line-height: 1;
      color: #ff2a2a;
      text-shadow:
        0 0 10px rgba(255, 0, 0, 0.55),
        0 0 22px rgba(255, 48, 48, 0.32);
    }

    .menu-brand__rule {
      width: min(calc(220px * var(--menu-logo-scale)), calc(44vw * var(--menu-logo-scale)));
      margin: calc(14px * var(--menu-logo-scale)) auto 0;
      border-bottom: 1px solid #ff1f1f;
      opacity: 1;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
    }

    .menu-brand__stars--top {
      display: none;
    }

    .menu-brand__rule {
      display: block;
    }

    .menu-brand__stars--bottom {
      margin-top: calc(8px * var(--menu-logo-scale));
      display: block;
    }

    .menu-list {
      display: grid;
      width: min(calc(var(--menu-button-width) * var(--menu-button-scale)), calc(var(--app-viewport-width) - 32px));
      gap: max(6px, var(--menu-list-gap));
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .menu-button {
      font-family: "BoldPixels", "Orbitron", "Rajdhani", sans-serif;
      width: 100%;
      aspect-ratio: 1217 / 154;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      background:
        url("assets/ui/menu_button_01.png") center center / 100% 100% no-repeat;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: max(14px, calc(17px * var(--menu-button-scale)));
      font-weight: 700;
      cursor: pointer;
      position: relative;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.72);
      overflow: visible;
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
      filter: brightness(1) saturate(1);
    }

    .menu-button span {
      position: relative;
      z-index: 1;
      display: inline-block;
      transform: translateY(4px);
    }

    .menu-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 6.5% 51%, rgba(255, 98, 40, 0.38), transparent 6%),
        radial-gradient(circle at 93.5% 51%, rgba(255, 98, 40, 0.38), transparent 6%);
      opacity: 0.72;
      pointer-events: none;
      mix-blend-mode: screen;
      transition: opacity 120ms ease, background 120ms ease;
    }

    .menu-button:hover,
    .menu-button:focus-visible {
      outline: none;
      color: #ffffff;
      transform: translateY(-1px);
      filter: brightness(1.06) saturate(1.08);
      box-shadow:
        0 0 0 1px rgba(255, 96, 52, 0.06) inset,
        0 0 8px rgba(255, 96, 52, 0.08);
    }

    .menu-button:hover::before,
    .menu-button:focus-visible::before {
      opacity: 1;
      background:
        radial-gradient(circle at 6.5% 51%, rgba(255, 128, 72, 0.5), transparent 6%),
        radial-gradient(circle at 93.5% 51%, rgba(255, 128, 72, 0.5), transparent 6%);
    }

    .menu-button.is-selected,
    .page-button.is-selected,
    .result-action-button.is-selected {
      outline: none;
    }

    .menu-button.is-selected,
    .result-action-button.is-selected {
      color: #ffffff;
      filter: brightness(1.12) saturate(1.14);
      box-shadow:
        0 0 0 1px rgba(255, 96, 52, 0.12) inset,
        0 0 16px rgba(255, 96, 52, 0.12);
    }

    .menu-button.is-selected::before,
    .result-action-button.is-selected::before {
      opacity: 1;
      background:
        radial-gradient(circle at 6.5% 51%, rgba(255, 128, 72, 0.52), transparent 6%),
        radial-gradient(circle at 93.5% 51%, rgba(255, 128, 72, 0.52), transparent 6%);
    }

    .menu-button.is-clicked,
    .page-button.is-clicked,
    .result-action-button.is-clicked {
      outline: none;
      color: #ff2f2f;
      transform: translateY(-1px);
      filter: brightness(1.17) saturate(1.22);
      box-shadow:
        0 0 0 1px rgba(255, 102, 56, 0.18) inset,
        0 0 24px rgba(255, 86, 40, 0.22),
        0 0 10px rgba(255, 66, 28, 0.12);
    }

    .menu-button.is-clicked::before,
    .result-action-button.is-clicked::before {
      opacity: 1;
      background:
        radial-gradient(circle at 6.5% 51%, rgba(255, 152, 92, 0.72), transparent 6%),
        radial-gradient(circle at 93.5% 51%, rgba(255, 152, 92, 0.72), transparent 6%);
    }

    .page-button.is-selected {
      border-color: var(--line-strong);
      color: #fff;
      background: linear-gradient(180deg, rgba(60, 74, 95, 0.98), rgba(31, 41, 56, 0.98));
      box-shadow: 0 0 0 1px rgba(104, 208, 255, 0.12) inset, 0 0 18px rgba(104, 208, 255, 0.08);
    }

    .page-shell {
      display: grid;
      gap: 18px;
      padding: var(--shell-vertical-margin) var(--shell-horizontal-margin);
      box-sizing: border-box;
    }

    .page-shell--exit-modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      gap: 0;
      padding: 0;
      pointer-events: none;
      z-index: 5;
    }

    .page-shell--exit-modal .page-header,
    .page-shell--exit-modal .page-actions {
      display: none !important;
    }

    .page-shell--exit-modal .page-body {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      pointer-events: auto;
    }

    .settings-shell,
    .terminal-shell {
      width: min(
        1120px,
        calc(var(--app-viewport-width) - (var(--shell-horizontal-margin) * 2)),
        calc((var(--app-viewport-height) - (var(--shell-vertical-margin) * 2)) * 1536 / 1024)
      );
      max-width: calc(var(--app-viewport-width) - (var(--shell-horizontal-margin) * 2));
      max-height: calc(var(--app-viewport-height) - (var(--shell-vertical-margin) * 2));
      aspect-ratio: 1536 / 1024;
      margin: 0 auto;
      padding:
        calc(clamp(72px, 5.5vw, 90px) * var(--overlay-padding-scale))
        calc(clamp(110px, 8vw, 140px) * var(--overlay-padding-scale))
        calc(clamp(66px, 5vw, 84px) * var(--overlay-padding-scale));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: url("assets/ui/panel.png") center center / 100% 100% no-repeat;
      box-sizing: border-box;
      font-family: "BoldPixels", "Orbitron", "Rajdhani", sans-serif;
    }

    body.mobile-shell-layout .page-shell {
      width: min(calc(var(--app-viewport-width) - 16px), 100vw);
      gap: 12px;
      padding: 8px;
    }

    body.mobile-shell-layout .settings-shell,
    body.mobile-shell-layout .terminal-shell {
      width: calc(var(--app-viewport-width) - 16px);
      max-width: calc(var(--app-viewport-width) - 16px);
      max-height: calc(var(--app-viewport-height) - 16px);
      min-height: min(700px, calc(var(--app-viewport-height) - 16px));
      aspect-ratio: auto;
      padding:
        calc(clamp(30px, 6.2vw, 40px) * var(--overlay-padding-scale))
        calc(clamp(16px, 4.6vw, 24px) * var(--overlay-padding-scale))
        calc(clamp(22px, 5vw, 30px) * var(--overlay-padding-scale));
      background-size: 100% 100%;
    }

    body.mobile-shell-layout .settings-shell__content,
    body.mobile-shell-layout .terminal-shell__content {
      gap: calc(clamp(10px, 1.8vw, 18px) * var(--overlay-gap-scale));
      padding-bottom: calc(clamp(6px, 1vw, 10px) * var(--overlay-gap-scale));
    }

    body.mobile-shell-layout .settings-stack,
    body.mobile-shell-layout .terminal-stack,
    body.mobile-shell-layout .terminal-results__stack,
    body.mobile-shell-layout .terminal-results__layout,
    body.mobile-shell-layout .terminal-controls__list,
    body.mobile-shell-layout .terminal-controls__layout,
    body.mobile-shell-layout .terminal-leaders__table,
    body.mobile-shell-layout .terminal-titles__text {
      width: 100%;
      max-width: 100%;
    }

    body.mobile-shell-layout .terminal-shell__footer-actions,
    body.mobile-shell-layout .page-actions {
      width: 100%;
      flex-direction: column;
      align-items: stretch;
      flex-wrap: nowrap;
    }

    body.mobile-shell-layout .terminal-shell__footer-actions .menu-button,
    body.mobile-shell-layout .result-action-button,
    body.mobile-shell-layout .settings-button,
    body.mobile-shell-layout .settings-back,
    body.mobile-shell-layout .terminal-back {
      width: 100%;
      max-width: 100%;
    }

    body.mobile-shell-layout .terminal-shell--pause {
      width: calc(var(--app-viewport-width) - 20px);
      max-width: calc(var(--app-viewport-width) - 20px);
      min-height: 0;
      grid-template-rows: auto auto;
    }

    body.mobile-shell-layout .terminal-shell--pause .terminal-shell__footer-actions,
    body.mobile-shell-layout .terminal-shell--exit .terminal-shell__footer-actions {
      flex-direction: row;
      align-items: center;
    }

    body.mobile-shell-layout .terminal-shell--pause .terminal-shell__footer-actions .menu-button,
    body.mobile-shell-layout .terminal-shell--exit .terminal-shell__footer-actions .menu-button {
      width: calc((100% - max(6px, calc(10px * var(--overlay-gap-scale)))) / 2);
    }

    body.mobile-shell-layout .terminal-leaders__row {
      min-height: 0;
      padding: 0 calc(8px * var(--overlay-gap-scale));
      white-space: pre-wrap;
      line-height: 1.35;
      font-size: max(10px, calc(12px * var(--overlay-gap-scale)));
      text-align: left;
    }

    body.mobile-shell-layout .terminal-titles__text {
      line-height: 1.5;
      font-size: max(11px, calc(13px * var(--overlay-gap-scale)));
      letter-spacing: 0.08em;
    }

    body.mobile-shell-layout .terminal-results__summary {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    body.mobile-shell-layout .terminal-results__summary .terminal-results__metric:last-child {
      grid-column: 1 / -1;
    }

    body.mobile-shell-layout .terminal-results__detail-grid,
    body.mobile-shell-layout .terminal-results__detail-list,
    body.mobile-shell-layout .terminal-results__two-col {
      grid-template-columns: 1fr;
    }

    body.mobile-shell-layout .terminal-results__metric,
    body.mobile-shell-layout .terminal-results__panel,
    body.mobile-shell-layout .terminal-results__detail-group {
      padding:
        calc(8px * var(--overlay-gap-scale))
        calc(9px * var(--overlay-gap-scale))
        calc(9px * var(--overlay-gap-scale));
    }

    body.mobile-shell-layout .terminal-results__detail-row,
    body.mobile-shell-layout .terminal-results__result-threat {
      grid-template-columns: minmax(0, 1fr);
      justify-items: start;
    }

    body.mobile-shell-layout .terminal-results__detail-value,
    body.mobile-shell-layout .terminal-results__result-threat-text,
    body.mobile-shell-layout .terminal-results__result-threat-index {
      text-align: left;
    }

    .pause-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: auto;
      z-index: 6;
    }

    .pause-overlay .terminal-shell--pause {
      width: min(458px, calc(var(--app-viewport-width) - 32px), calc((var(--app-viewport-height) - 32px) * 1536 / 1024));
      padding:
        calc(clamp(18px, 2vw, 24px) * var(--overlay-padding-scale))
        calc(clamp(24px, 2.7vw, 32px) * var(--overlay-padding-scale))
        calc(clamp(14px, 1.5vw, 18px) * var(--overlay-padding-scale));
      grid-template-rows: auto auto;
      align-content: center;
    }

    .terminal-shell--pause .terminal-shell__content {
      display: none;
    }

    .terminal-shell--pause .terminal-titles__text {
      gap: 0;
      min-height: 0;
      color: var(--text);
      font-size: 0;
      letter-spacing: 0;
    }

    .terminal-shell--pause .terminal-shell__title {
      font-size: calc(clamp(26px, 2.35vw, 34px) * var(--overlay-title-scale));
      letter-spacing: 0.24em;
      transform: translateY(calc(-36px * var(--overlay-gap-scale)));
    }

    .terminal-shell--pause .terminal-shell__footer {
      align-items: center;
      padding-bottom: 0;
    }

    .terminal-shell--pause .terminal-shell__footer-actions {
      width: min(100%, 428px);
      gap: max(6px, calc(10px * var(--overlay-gap-scale)));
      flex-wrap: nowrap;
    }

    .terminal-shell--pause .terminal-shell__footer-actions .menu-button {
      width: calc((100% - max(6px, calc(10px * var(--overlay-gap-scale)))) / 2);
      font-size: max(15px, calc(18px * var(--overlay-button-scale)));
    }

    .terminal-shell--pause .menu-button span {
      transform: translateY(3px);
    }

    .settings-shell__header,
    .terminal-shell__header {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-shell__title,
    .terminal-shell__title {
      font-size: calc(clamp(24px, 2.2vw, 34px) * var(--overlay-title-scale));
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
    }

    .settings-shell__content,
    .terminal-shell__content {
      display: grid;
      align-content: start;
      gap: calc(clamp(18px, 2.2vw, 28px) * var(--overlay-gap-scale));
      justify-items: center;
      padding-bottom: calc(clamp(10px, 1.5vw, 18px) * var(--overlay-gap-scale));
      box-sizing: border-box;
      min-height: 0;
      overflow: hidden;
    }

    .settings-stack,
    .terminal-stack {
      display: grid;
      gap: max(6px, calc(12px * var(--overlay-gap-scale)));
      align-content: start;
      justify-items: center;
      width: min(100%, 720px);
      min-height: 0;
    }

    .settings-button,
    .terminal-button {
      width: min(100%, calc(540px * var(--overlay-button-scale)));
    }

    .settings-back,
    .terminal-back {
      width: min(calc(360px * var(--overlay-button-scale)), 66%);
      margin-top: 0;
    }

    .settings-shell__footer,
    .terminal-shell__footer {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-bottom: calc(clamp(16px, 1.4vw, 22px) * var(--overlay-gap-scale));
    }

    .terminal-shell__footer-actions {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: max(6px, calc(12px * var(--overlay-gap-scale)));
      flex-wrap: wrap;
    }

    .terminal-shell__footer-actions .menu-button {
      width: min(calc(300px * var(--overlay-button-scale)), calc((100% - max(6px, calc(12px * var(--overlay-gap-scale)))) / 2));
    }

    .terminal-shell--leaders .terminal-shell__content,
    .terminal-shell--titles .terminal-shell__content,
    .terminal-shell--results .terminal-shell__content {
      align-content: stretch;
    }

    .terminal-shell--titles .terminal-shell__content {
      align-content: center;
    }

    .terminal-shell--catalog .terminal-shell__content {
      align-content: start;
      padding-top: clamp(8px, 1vw, 14px);
    }

    .terminal-shell--leaders .terminal-shell__content {
      align-content: start;
      padding-top: calc(clamp(10px, 1.2vw, 16px) * var(--overlay-gap-scale));
    }

    .terminal-shell--controls .terminal-shell__content {
      align-content: start;
      padding-top: calc(clamp(4px, 0.6vw, 10px) * var(--overlay-gap-scale));
    }

    .terminal-shell--exit .terminal-shell__content {
      align-content: center;
      justify-items: center;
      gap: calc(clamp(18px, 2vw, 26px) * var(--overlay-gap-scale));
      padding-top: calc(clamp(18px, 2vw, 28px) * var(--overlay-gap-scale));
      padding-bottom: calc(clamp(12px, 1.2vw, 18px) * var(--overlay-gap-scale));

  <script>
    const uiRoot = document.getElementById("uiRoot");
    const menuScreen = document.getElementById("menuScreen");
    const pageScreen = document.getElementById("pageScreen");
    const resultScreen = document.getElementById("resultScreen");
    const pageHeader = document.getElementById("pageHeader");
    const pageTitle = document.getElementById("pageTitle");
    const pageTag = document.getElementById("pageTag");
    const pageBody = document.getElementById("pageBody");
    const pageActions = document.getElementById("pageActions");
    const resultTitle = document.getElementById("resultTitle");
    const resultBody = document.getElementById("resultBody");
    const resultActions = document.getElementById("resultActions");
    const pauseScreen = document.getElementById("pauseScreen");
    const pauseContinueButton = document.querySelector(".pause-continue");
    const pauseMenuButton = document.querySelector(".pause-menu");
    const mobileControls = document.getElementById("mobileControls");
    const joystickZone = document.getElementById("joystickZone");
    const joystickBase = document.getElementById("joystickBase");
    const joystickKnob = document.getElementById("joystickKnob");
    const mobileFireButton = document.getElementById("mobileFireButton");
    const menuBrand = menuScreen.querySelector(".menu-brand");
    const menuList = document.getElementById("menuList");
    const menuButtons = Array.from(document.querySelectorAll("#menuScreen [data-action]"));

    const mainMenuOrder = ["play", "settings", "leaders", "titles", "exit"];
    let currentResultData = null;
    let resultDetailsExpanded = false;
    window.__resultOverlayActive = false;
    let menuActivationTimer = null;
    let menuActivationPending = false;
    const settingsState = {
      developerMode: false
    };
    const isTouchInterface = window.__isTouchDevice === true;
    const mobileJoystick = {
      pointerId: null,
      centerX: 0,
      centerY: 0,
      maxDistance: 44
    };
    const mobileFire = {
      pointerId: null
    };
    let layoutUpdateFrame = null;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getViewportMetrics() {
      const viewportWidthCandidates = [window.innerWidth];
      const viewportHeightCandidates = [window.innerHeight];
      if (window.visualViewport) {
        if (Number.isFinite(window.visualViewport.width) && window.visualViewport.width > 0) {
          viewportWidthCandidates.push(window.visualViewport.width);
        }
        if (Number.isFinite(window.visualViewport.height) && window.visualViewport.height > 0) {
          viewportHeightCandidates.push(window.visualViewport.height);
        }
      }

      return {
        width: Math.max(0, Math.floor(Math.min(...viewportWidthCandidates))),
        height: Math.max(0, Math.floor(Math.min(...viewportHeightCandidates)))
      };
    }

    function updateViewportCssVariables() {
      const viewport = getViewportMetrics();
      document.documentElement.style.setProperty("--app-viewport-width", `${viewport.width}px`);
      document.documentElement.style.setProperty("--app-viewport-height", `${viewport.height}px`);
      return viewport;
    }

    function isMobileShellViewport(viewport = getViewportMetrics()) {
      return isTouchInterface && Math.min(viewport.width, viewport.height) <= 900;
    }

    function syncMobileShellLayout() {
      const viewport = updateViewportCssVariables();
      const mobileShellActive = isMobileShellViewport(viewport);
      document.body.classList.toggle("mobile-shell-layout", mobileShellActive);
      document.documentElement.style.setProperty("--mobile-shell-active", mobileShellActive ? "1" : "0");
      return viewport;
    }

    function resetMenuLayoutVariables() {
      const rootStyle = document.documentElement.style;
      rootStyle.setProperty("--menu-logo-scale", "1");
      rootStyle.setProperty("--menu-button-scale", "1");
      rootStyle.setProperty("--menu-stack-gap", "34px");
      rootStyle.setProperty("--menu-list-gap", "12px");
    }

    function applyMenuLayout() {
      const viewport = updateViewportCssVariables();
      if (!menuScreen || menuScreen.hidden || !menuBrand || !menuList) {
        return;
      }

      resetMenuLayoutVariables();

      const rootStyle = document.documentElement.style;
      const safeTop = 24;
      const safeBottom = 24;
      const minStackGap = 12;
      const minListGap = 6;
      const minLogoScale = 0.58;
      const minButtonScale = 0.78;
      let stackGap = 34;
      let listGap = 12;
      let logoScale = 1;
      let buttonScale = 1;
      const availableHeight = Math.max(0, viewport.height - safeTop - safeBottom);

      if (availableHeight <= 0) {
        return;
      }

      function readHeights() {
        return {
          brandHeight: Math.ceil(menuBrand.getBoundingClientRect().height),
          listHeight: Math.ceil(menuList.getBoundingClientRect().height)
        };
      }

      let { brandHeight, listHeight } = readHeights();
      let totalHeight = brandHeight + stackGap + listHeight;

      if (totalHeight > availableHeight) {
        stackGap = Math.max(minStackGap, stackGap - (totalHeight - availableHeight));
        rootStyle.setProperty("--menu-stack-gap", `${Math.round(stackGap)}px`);
        totalHeight = brandHeight + stackGap + listHeight;
      }

      if (totalHeight > availableHeight && brandHeight > 0) {
        const maxBrandHeight = Math.max(brandHeight * minLogoScale, availableHeight - stackGap - listHeight);
        logoScale = clamp(maxBrandHeight / brandHeight, minLogoScale, 1);
        rootStyle.setProperty("--menu-logo-scale", logoScale.toFixed(4));
        ({ brandHeight, listHeight } = readHeights());
        totalHeight = brandHeight + stackGap + listHeight;
      }

      if (totalHeight > availableHeight && listHeight > 0) {
        const maxListHeight = Math.max(listHeight * minButtonScale, availableHeight - stackGap - brandHeight);
        buttonScale = clamp(maxListHeight / listHeight, minButtonScale, 1);
        listGap = Math.max(minListGap, Math.round(12 * buttonScale));
        rootStyle.setProperty("--menu-button-scale", buttonScale.toFixed(4));
        rootStyle.setProperty("--menu-list-gap", `${listGap}px`);
        ({ brandHeight, listHeight } = readHeights());
        totalHeight = brandHeight + stackGap + listHeight;
      }

      for (let attempt = 0; attempt < 8 && totalHeight > availableHeight; attempt += 1) {
        if (logoScale > minLogoScale) {
          logoScale = clamp(logoScale - 0.04, minLogoScale, 1);
          rootStyle.setProperty("--menu-logo-scale", logoScale.toFixed(4));
        } else if (buttonScale > minButtonScale) {
          buttonScale = clamp(buttonScale - 0.03, minButtonScale, 1);
          rootStyle.setProperty("--menu-button-scale", buttonScale.toFixed(4));
          listGap = Math.max(minListGap, Math.round(12 * buttonScale));
          rootStyle.setProperty("--menu-list-gap", `${listGap}px`);
        } else if (stackGap > minStackGap) {
          stackGap = Math.max(minStackGap, stackGap - 2);
          rootStyle.setProperty("--menu-stack-gap", `${Math.round(stackGap)}px`);
        } else {
          break;
        }

        ({ brandHeight, listHeight } = readHeights());
        totalHeight = brandHeight + stackGap + listHeight;
      }
    }

    function resetOverlayLayoutVariables() {
      const rootStyle = document.documentElement.style;
      rootStyle.setProperty("--overlay-padding-scale", "1");
      rootStyle.setProperty("--overlay-gap-scale", "1");
      rootStyle.setProperty("--overlay-button-scale", "1");
      rootStyle.setProperty("--overlay-title-scale", "1");
    }

    function getActiveOverlayShell() {
      if (pauseScreen && !pauseScreen.hidden) {
        return pauseScreen.querySelector(".terminal-shell");
      }

      if (resultScreen && !resultScreen.hidden) {
        return resultScreen.querySelector(".terminal-shell");
      }

      if (pageScreen && !pageScreen.hidden) {
        return pageBody.querySelector(".terminal-shell");
      }

      return null;
    }

    function measureOverlayShell(shell) {
      const buttons = Array.from(shell.querySelectorAll(".menu-button, .result-action-button"));
      const shellRect = shell.getBoundingClientRect();
      const measuredNodes = Array.from(shell.querySelectorAll(".terminal-shell__header, .terminal-shell__content, .terminal-shell__footer, .settings-shell__header, .settings-shell__content, .settings-shell__footer, .terminal-results__layout, .terminal-results__stack, .terminal-controls__layout, .terminal-controls__list, .terminal-leaders__table, .terminal-titles__text"));
      const buttonRects = buttons.map((button) => button.getBoundingClientRect());
      let overlap = false;
      let minGap = Infinity;
      let overflowBoundsX = 0;
      let overflowBoundsY = 0;

      for (let index = 0; index < buttonRects.length; index += 1) {
        for (let nextIndex = index + 1; nextIndex < buttonRects.length; nextIndex += 1) {
          const rect = buttonRects[index];
          const nextRect = buttonRects[nextIndex];
          const horizontalOverlap = Math.min(rect.right, nextRect.right) - Math.max(rect.left, nextRect.left);
          const verticalOverlap = Math.min(rect.bottom, nextRect.bottom) - Math.max(rect.top, nextRect.top);

          if (horizontalOverlap > 1 && verticalOverlap > 1) {
            overlap = true;
          }

          if (horizontalOverlap > 1) {
            const verticalGap = rect.top <= nextRect.top
              ? nextRect.top - rect.bottom
              : rect.top - nextRect.bottom;
            minGap = Math.min(minGap, verticalGap);
          }
        }
      }

      for (const node of measuredNodes) {
        const rect = node.getBoundingClientRect();
        overflowBoundsX = Math.max(
          overflowBoundsX,
          Math.max(0, shellRect.left - rect.left),
          Math.max(0, rect.right - shellRect.right)
        );
        overflowBoundsY = Math.max(
          overflowBoundsY,
          Math.max(0, shellRect.top - rect.top),
          Math.max(0, rect.bottom - shellRect.bottom)
        );
      }

      return {
        overflowX: Math.max(0, shell.scrollWidth - shell.clientWidth),
        overflowY: Math.max(0, shell.scrollHeight - shell.clientHeight),
        overflowBoundsX,
        overflowBoundsY,
        hasOverlap: overlap,
        minGap: Number.isFinite(minGap) ? minGap : 0
      };
    }

    function applyOverlayLayout() {
      syncMobileShellLayout();
      const shell = getActiveOverlayShell();
      if (!shell) {
        resetOverlayLayoutVariables();
        return;
      }

      resetOverlayLayoutVariables();

      const rootStyle = document.documentElement.style;
      const mobileShellActive = document.body.classList.contains("mobile-shell-layout");
      const minPaddingScale = mobileShellActive ? 0.34 : 0.5;
      const minGapScale = mobileShellActive ? 0.3 : 0.44;
      const minButtonScale = mobileShellActive ? 0.48 : 0.52;
      const minTitleScale = mobileShellActive ? 0.5 : 0.6;
      let paddingScale = 1;
      let gapScale = 1;
      let buttonScale = 1;
      let titleScale = 1;

      function writeOverlayVariables() {
        rootStyle.setProperty("--overlay-padding-scale", paddingScale.toFixed(4));
        rootStyle.setProperty("--overlay-gap-scale", gapScale.toFixed(4));
        rootStyle.setProperty("--overlay-button-scale", buttonScale.toFixed(4));
        rootStyle.setProperty("--overlay-title-scale", titleScale.toFixed(4));
      }

      writeOverlayVariables();

      for (let attempt = 0; attempt < 48; attempt += 1) {
        const metrics = measureOverlayShell(shell);
        if (
          metrics.overflowX <= 0 &&
          metrics.overflowY <= 0 &&
          metrics.overflowBoundsX <= 0 &&
          metrics.overflowBoundsY <= 0 &&
          !metrics.hasOverlap &&
          metrics.minGap >= 0
        ) {
          break;
        }

        if (paddingScale > minPaddingScale) {
          paddingScale = clamp(paddingScale - 0.06, minPaddingScale, 1);
        } else if (gapScale > minGapScale) {
          gapScale = clamp(gapScale - 0.06, minGapScale, 1);
        } else if (buttonScale > minButtonScale) {
          buttonScale = clamp(buttonScale - 0.04, minButtonScale, 1);
        } else if (titleScale > minTitleScale) {
          titleScale = clamp(titleScale - 0.04, minTitleScale, 1);
        } else {
          break;
        }

        writeOverlayVariables();
      }
    }

    function scheduleLayoutUpdate() {
      if (layoutUpdateFrame !== null) {
        window.cancelAnimationFrame(layoutUpdateFrame);
      }

      layoutUpdateFrame = window.requestAnimationFrame(() => {
        layoutUpdateFrame = null;
        applyMenuLayout();
        applyOverlayLayout();
        positionIdleJoystickBase();
      });
    }

    function syncDeveloperModeSetting() {
      if (typeof window.__setDeveloperModeEnabled === "function") {
        window.__setDeveloperModeEnabled(settingsState.developerMode);
      } else {
        window.__developerModeEnabled = settingsState.developerMode;
      }
    }

    function toggleDeveloperModeSetting() {
      settingsState.developerMode = !settingsState.developerMode;
      syncDeveloperModeSetting();
    }

    function setMobileControlsVisible(visible) {
      if (!mobileControls) {
        return;
      }

      mobileControls.hidden = !visible;
      if (visible) {
        positionIdleJoystickBase();
      }
    }

    function getJoystickBaseLocalPosition(clientX, clientY) {
      const zoneRect = joystickZone?.getBoundingClientRect();
      if (!zoneRect) {
        return { left: 0, top: 0 };
      }

      return {
        left: clamp(clientX - zoneRect.left, 58, Math.max(58, zoneRect.width - 58)),
        top: clamp(clientY - zoneRect.top, 58, Math.max(58, zoneRect.height - 58))
      };
    }

    function setJoystickBasePosition(clientX, clientY) {
      if (!joystickBase) {
        return;
      }

      const local = getJoystickBaseLocalPosition(clientX, clientY);
      joystickBase.style.left = local.left + "px";
      joystickBase.style.top = local.top + "px";
    }

    function positionIdleJoystickBase() {
      if (!isTouchInterface || !joystickZone || !joystickBase) {
        return;
      }

      const zoneRect = joystickZone.getBoundingClientRect();
      if (!zoneRect.width || !zoneRect.height) {
        return;
      }

      const idleClientX = zoneRect.left + Math.max(58, Math.min(zoneRect.width - 58, zoneRect.width * 0.62));
      const idleClientY = zoneRect.top + Math.max(58, Math.min(zoneRect.height - 58, zoneRect.height * 0.58));
      setJoystickBasePosition(idleClientX, idleClientY);
    }

    function resetJoystickVisual() {
      if (!joystickBase || !joystickKnob) {
        return;
      }

      positionIdleJoystickBase();
      joystickBase.classList.remove("is-visible");
      joystickKnob.style.transform = "translate(0px, 0px)";
    }

    function resetMobileJoystick() {
      mobileJoystick.pointerId = null;
      if (typeof window.__setMobileMoveVector === "function") {
        window.__setMobileMoveVector(0, 0);
      }
      resetJoystickVisual();
    }

    function resetMobileFire() {
      mobileFire.pointerId = null;
      mobileFireButton?.classList.remove("is-active");
      if (typeof window.__setMobileFireActive === "function") {
        window.__setMobileFireActive(false);
      }
    }

    function clampMobileJoystickDelta(dx, dy) {
      const distance = Math.hypot(dx, dy);
      if (distance <= mobileJoystick.maxDistance || distance === 0) {
        return { dx, dy };
      }

      const ratio = mobileJoystick.maxDistance / distance;
      return {
        dx: dx * ratio,
        dy: dy * ratio
      };
    }

    function updateMobileJoystick(pointerX, pointerY) {
      const clamped = clampMobileJoystickDelta(pointerX - mobileJoystick.centerX, pointerY - mobileJoystick.centerY);
      joystickKnob.style.transform = `translate(${clamped.dx}px, ${clamped.dy}px)`;
      if (typeof window.__setMobileMoveVector === "function") {
        window.__setMobileMoveVector(clamped.dx / mobileJoystick.maxDistance, clamped.dy / mobileJoystick.maxDistance);
      }
    }

    function bindMobileControls() {
      if (!isTouchInterface || !joystickZone || !joystickBase || !joystickKnob || !mobileFireButton) {
        return;
      }

      joystickZone.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse" || mobileJoystick.pointerId !== null) {
          return;
        }

        event.preventDefault();
        mobileJoystick.pointerId = event.pointerId;
        mobileJoystick.centerX = event.clientX;
        mobileJoystick.centerY = event.clientY;
        setJoystickBasePosition(mobileJoystick.centerX, mobileJoystick.centerY);
        joystickBase.classList.add("is-visible");
        updateMobileJoystick(event.clientX, event.clientY);
      });

      joystickZone.addEventListener("pointermove", (event) => {
        if (event.pointerId !== mobileJoystick.pointerId) {
          return;
        }

        event.preventDefault();
        updateMobileJoystick(event.clientX, event.clientY);
      });

      function releaseJoystick(event) {
        if (event.pointerId !== mobileJoystick.pointerId) {
          return;
        }

        event.preventDefault();
        resetMobileJoystick();
      }

      joystickZone.addEventListener("pointerup", releaseJoystick);
      joystickZone.addEventListener("pointercancel", releaseJoystick);

      mobileFireButton.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse" || mobileFire.pointerId !== null) {
          return;
        }

        event.preventDefault();
        mobileFire.pointerId = event.pointerId;
        mobileFireButton.classList.add("is-active");
        if (typeof window.__setMobileFireActive === "function") {
          window.__setMobileFireActive(true);
        }
      });

      function releaseFire(event) {
        if (event.pointerId !== mobileFire.pointerId) {
          return;
        }

        event.preventDefault();
        resetMobileFire();
      }

      mobileFireButton.addEventListener("pointerup", releaseFire);
      mobileFireButton.addEventListener("pointercancel", releaseFire);

      window.addEventListener("pointerup", releaseJoystick);
      window.addEventListener("pointercancel", releaseJoystick);
      window.addEventListener("pointerup", releaseFire);
      window.addEventListener("pointercancel", releaseFire);
      window.addEventListener("blur", () => {
        resetMobileJoystick();
        resetMobileFire();
      });

      positionIdleJoystickBase();
    }

    syncDeveloperModeSetting();

    const pages = {
      settings: {

        ],

        ]
      },

        ],
        actions: [

      },
      titles: {

    function syncTerminalButtonSelection(button) {
      const context = getActiveKeyboardContext();
      const buttonIndex = context.buttons.indexOf(button);
      if (buttonIndex === -1) {
        return;
      }

      setKeyboardSelectionIndex(context.kind, buttonIndex);
      applyKeyboardSelection(context.kind, context.buttons, buttonIndex);
    }

    function bindTerminalAction(button, commit) {
      terminalActionCommits.set(button, commit);
      button.addEventListener("mouseenter", () => {
        syncTerminalButtonSelection(button);
      });
      button.addEventListener("focus", () => {
        syncTerminalButtonSelection(button);
      });
      button.addEventListener("click", (event) => {
        event.preventDefault();
        syncTerminalButtonSelection(button);
        triggerTerminalAction(button, commit);
      });
    }

    function activateTerminalButton(button) {
      if (!button) {
        return;
      }

      const commit = terminalActionCommits.get(button);
      if (!commit) {
        return;
      }

      triggerTerminalAction(button, commit);
    }

    function triggerTerminalAction(button, commit) {
      if (menuActivationPending) {
        return;
      }

      menuActivationPending = true;
      if (menuActivationTimer !== null) {
        window.clearTimeout(menuActivationTimer);
      }

      if (button) {
        button.classList.add("is-clicked");
      }

      menuActivationTimer = window.setTimeout(() => {
        menuActivationPending = false;
        menuActivationTimer = null;

        if (button) {
          button.classList.remove("is-clicked");
        }

        commit();
      }, 280);
    }

    function renderPage(key) {
      const page = pages[key];

      if (["settings", "controls", "catalog", "leaders", "titles", "results", "exit"].includes(key)) {
        pageBody.innerHTML = renderShellPage(key);
        pageActions.innerHTML = "";
        if (key === "exit") {
          const yesButton = pageBody.querySelector(".terminal-exit-yes");
          const noButton = pageBody.querySelector(".terminal-exit-no");
          if (yesButton) {
            bindTerminalAction(yesButton, () => window.close());
          }
          if (noButton) {
            bindTerminalAction(noButton, () => showMenu());
          }
          return;
        }

        const backButton = pageBody.querySelector(".terminal-back");
        if (backButton) {
          const backTarget = key === "controls" ? "settings" : "menu";
          bindTerminalAction(backButton, () => {
            if (backTarget === "settings") {
              showPage("settings");
              return;
            }
            showMenu();
          });
        }

        if (key === "settings") {
          const settingsButtons = pageBody.querySelectorAll(".settings-button");

            bindTerminalAction(settingsButtons[0], () => showPage("controls"));

        pageActions.appendChild(button);

    function formatResultThreatLabel(reason) {
      if (!reason) {
        return "-";
      }

      const friendlyLabelMap = {
        "Снаряд врага": "Снаряды врага",
        "Снаряд босса": "Снаряды босса",
        "Выстрел зигзага": "Выстрелы зигзага",
        "Рассеянный выстрел босса": "Рассеянные выстрелы босса",
        "Удар дрона": "Удары дрона",
        "Осколки": "Осколки",
        "Лапа босса": "Лапы босса",
        "Ракета танка": "Ракеты танков",
        "Опасная зона": "Опасные зоны"
      };

      if (typeof reason === "string") {
        return friendlyLabelMap[reason] || reason;
      }

      const label = friendlyLabelMap[reason.reason] || reason.reason || "-";
      const count = Number.isFinite(reason.count) ? reason.count : null;

      return count !== null ? `${label} ×${count}` : label;
    }

    function formatResultDamageValue(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) {
        return value ?? "-";
      }

      return numeric.toFixed(1).replace(/\.0$/, "");
    }

                      <div class="terminal-results__detail-title">${group.title}</div>
                      <div class="terminal-results__detail-list">
                        ${group.rows.map((row) => `
                          <div class="terminal-results__detail-row">
                            <div class="terminal-results__detail-label">${row.label}</div>
                            <div class="terminal-results__detail-value${row.accent ? " terminal-results__detail-value--accent" : ""}">${row.value}</div>
                          </div>
                        `).join("")}
                      </div>
                    </section>
                  `).join("")}
                </div>
              `).join("")}
            </div>
          </div>
        `;
      } else {
        resultBody.innerHTML = `
          <div class="terminal-results__layout">
            <div class="terminal-results__summary">
              ${summaryRows.map((row) => `
                <div class="terminal-results__metric">
                  <div class="terminal-results__metric-label">${row.label}</div>
                  <div class="terminal-results__metric-value${row.grade ? " terminal-results__metric-value--grade" : ""}">${row.value}</div>
                </div>
              `).join("")}
            </div>
            <section class="terminal-results__result-summary terminal-results__panel terminal-results__panel--wide">
              <div class="terminal-results__panel-title">ИТОГ ЗАБЕГА</div>
              <div class="terminal-results__result-lead">${summaryLead}</div>
              <div class="terminal-results__result-threats">
                ${summaryThreatsMarkup}
              </div>
            </section>
            <section class="terminal-results__panel terminal-results__panel--wide">
              <div class="terminal-results__panel-title">КОММЕНТАРИЙ ЗАБЕГА</div>
              <div class="terminal-results__comment">${commentText}</div>
            </section>
          </div>
        `;
      }

      resultActions.innerHTML = "";

      const actions = [
        {
          label: resultDetailsExpanded ? "СВЕРНУТЬ" : "ПОДРОБНЕЕ",
          action: "toggleDetails"
        },
        {
          label: "ИГРАТЬ СНОВА",
          action: "restart"
        },
        {
          label: "В МЕНЮ",
          action: "menu"
        }
      ];

      for (const item of actions) {
        const button = document.createElement("button");
        button.className = "result-action-button";
        button.type = "button";
        button.innerHTML = `<span>${item.label}</span>`;
        button.dataset.action = item.action;
        bindTerminalAction(button, () => onResultActionClick({ currentTarget: button }));
        resultActions.appendChild(button);
      }
    }

    function showMenu() {
      view = "menu";
      currentPageKey = null;
      pageScreen.classList.remove("page-shell--exit-modal");
      menuActivationPending = false;
      if (menuActivationTimer !== null) {
        window.clearTimeout(menuActivationTimer);
        menuActivationTimer = null;
      }
      menuButtons.forEach((button) => {
        button.classList.remove("is-clicked");
      });
      pageBody.querySelectorAll(".is-clicked").forEach((button) => {
        button.classList.remove("is-clicked");
      });
      if (pageHeader) {
        pageHeader.hidden = false;
      }
      menuScreen.hidden = false;
      pageScreen.hidden = true;
      resultScreen.hidden = true;
      window.__resultOverlayActive = false;
      setDomMenuActive(true);
      uiRoot.setAttribute("aria-label", "Главное меню");
      scheduleLayoutUpdate();
      syncKeyboardSelection();
    }

    function showPage(key) {
      view = key;
      currentPageKey = key;
      pageSelectedIndex = 0;
      renderPage(key);
      menuScreen.hidden = key === "exit" ? false : true;
      pageScreen.hidden = false;
      resultScreen.hidden = true;
      pageScreen.classList.toggle("page-shell--exit-modal", key === "exit");
      setDomMenuActive(true);
      uiRoot.setAttribute("aria-label", pages[key].title);
      scheduleLayoutUpdate();
      syncKeyboardSelection();
    }

    function selectMenu(delta) {
      if (menuActivationPending) {
        return;
      }
      selectedIndex = (selectedIndex + delta + mainMenuOrder.length) % mainMenuOrder.length;
    }

    function activateMenuSelection(action, button) {
      if (action === "play") {
        setDomMenuActive(false);
        menuScreen.hidden = true;
        pageScreen.hidden = true;
        uiRoot.hidden = true;
        if (typeof window.__startGameFromMenu === "function") {
          window.__startGameFromMenu();
        }
        return;
      }

      showPage(action);
    }

    function showResult(data) {
      currentResultData = data;
      resultDetailsExpanded = false;
      resultSelectedIndex = 0;
      window.__resultOverlayActive = true;
      view = "result";
      uiRoot.hidden = false;
      menuScreen.hidden = true;
      pageScreen.hidden = true;
      resultScreen.hidden = false;
      resultTitle.textContent = "РЕЗУЛЬТАТЫ";
      renderResultRows();
      setDomMenuActive(true);
      uiRoot.setAttribute("aria-label", data.outcome === "victory" ? "Победа" : "Поражение");
      syncKeyboardSelection();
      scheduleLayoutUpdate();
      window.requestAnimationFrame(() => {
        const firstAction = resultActions.querySelector("button");
        if (firstAction) {
          firstAction.focus({ preventScroll: true });
        }
      });
    }

    function onPageActionClick(event) {
      const action = event.currentTarget.dataset.action;
      if (!action) {
        return;
      }

      if (action === "back") {
        showMenu();
      }

      if (action === "close") {
        window.close();
      }
    }

    function onResultActionClick(event) {
      const action = event.currentTarget.dataset.action;

      if (action === "toggleDetails") {
        resultDetailsExpanded = !resultDetailsExpanded;
        renderResultRows();
        scheduleLayoutUpdate();
        return;
      }

      if (action === "restart") {
        resultScreen.hidden = true;
        window.__resultOverlayActive = false;
        uiRoot.hidden = true;
        if (typeof window.__startGameFromMenu === "function") {
          window.__startGameFromMenu();
        }
        return;
      }

      if (action === "menu") {
        resultScreen.hidden = true;
        window.__resultOverlayActive = false;
        if (typeof window.__returnToMenu === "function") {
          window.__returnToMenu();
        }
        showMenu();
      }
    }

    function onPauseActionClick(event) {
      const action = event.currentTarget.dataset.action;

      if (action === "resume") {
        if (typeof window.__resumeGameFromPause === "function") {
          window.__resumeGameFromPause();
        }
        pauseScreen.hidden = true;
        return;
      }

      if (action === "menu") {
        if (typeof window.__returnToMenu === "function") {
          window.__returnToMenu();
        }
        showMenu();
        pauseScreen.hidden = true;
      }
    }

    let pageSelectedIndex = 0;
    let resultSelectedIndex = 0;
    let pauseSelectedIndex = 0;
    let currentPageKey = null;

    function setKeyboardSelectionIndex(kind, index) {
      if (kind === "menu") {
        selectedIndex = index;
      } else if (kind === "page") {
        pageSelectedIndex = index;
      } else if (kind === "result") {
        resultSelectedIndex = index;
      } else if (kind === "pause") {
        pauseSelectedIndex = index;
      }
    }

    function getActiveKeyboardContext() {
      if (!pauseScreen.hidden && typeof window.__isGamePaused === "function" && window.__isGamePaused()) {
        return {
          kind: "pause",
          buttons: [pauseContinueButton, pauseMenuButton].filter(Boolean),
          index: pauseSelectedIndex
        };
      }

      if (!resultScreen.hidden) {
        return {
          kind: "result",
          buttons: Array.from(resultActions.querySelectorAll("button")),
          index: resultSelectedIndex
        };
      }

      if (!pageScreen.hidden) {
        return {
          kind: "page",
          pageKey: currentPageKey,
          buttons: Array.from(pageScreen.querySelectorAll("button")),
          index: pageSelectedIndex
        };
      }

      return {
        kind: "menu",
        buttons: menuButtons,
        index: selectedIndex
      };
    }

    function applyKeyboardSelection(kind, buttons, index) {
      buttons.forEach((button, buttonIndex) => {
        button.classList.toggle("is-selected", buttonIndex === index);
      });

      const selectedButton = buttons[index];
      if (selectedButton) {
        selectedButton.focus({ preventScroll: true });
      }
    }

    function syncKeyboardSelection() {
      const { kind, buttons, index } = getActiveKeyboardContext();
      if (!buttons.length) {
        return;
      }

      applyKeyboardSelection(kind, buttons, Math.max(0, Math.min(index, buttons.length - 1)));
    }

    function moveKeyboardSelection(delta) {
      const context = getActiveKeyboardContext();
      const { kind, buttons } = context;
      if (!buttons.length) {
        return;
      }

      const nextIndex = (context.index + delta + buttons.length) % buttons.length;

      setKeyboardSelectionIndex(kind, nextIndex);
      applyKeyboardSelection(kind, buttons, nextIndex);
    }

    function isHorizontalKeyboardContext(context) {
      if (context.kind === "pause" || context.kind === "result") {
        return true;
      }

      if (context.kind === "page" && context.pageKey === "exit") {
        return true;
      }

      return false;
    }

    function isSelectionKey(event, horizontal) {
      if (horizontal) {
        return event.code === "ArrowLeft" || event.code === "ArrowRight" || event.code === "KeyA" || event.code === "KeyD";
      }

      return event.code === "ArrowUp" || event.code === "ArrowDown" || event.code === "KeyW" || event.code === "KeyS";
    }

    function getSelectionDelta(event, horizontal) {
      if (horizontal) {
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          return -1;
        }

        if (event.code === "ArrowRight" || event.code === "KeyD") {
          return 1;
        }
      } else {
        if (event.code === "ArrowUp" || event.code === "KeyW") {
          return -1;
        }

        if (event.code === "ArrowDown" || event.code === "KeyS") {
          return 1;
        }
      }

      return 0;
    }

    function activateKeyboardSelection() {
      const { kind, buttons, index } = getActiveKeyboardContext();
      const button = buttons[index];

      activateTerminalButton(button);
    }

    menuButtons.forEach((button, index) => {
      bindTerminalAction(button, () => {
        selectedIndex = index;
        activateMenuSelection(mainMenuOrder[selectedIndex], button);
      });
    });

    if (pauseContinueButton) {
      bindTerminalAction(pauseContinueButton, () => onPauseActionClick({ currentTarget: pauseContinueButton }));
    }

    if (pauseMenuButton) {
      bindTerminalAction(pauseMenuButton, () => onPauseActionClick({ currentTarget: pauseMenuButton }));
    }

    bindMobileControls();
    syncKeyboardSelection();

    window.__showRunResult = function showRunResult(data) {
      currentResultData = data;
      showResult(data);
    };

    window.__hideRunResult = function hideRunResult() {
      currentResultData = null;
      window.__resultOverlayActive = false;
      resultScreen.hidden = true;
    };

    window.addEventListener("keydown", (event) => {
      if (event.defaultPrevented) {
        return;
      }

      const pauseActive = typeof window.__isGamePaused === "function" && window.__isGamePaused();
      const resultActive = !resultScreen.hidden;
      const pageActive = !pageScreen.hidden;
      const sceneValue = typeof window.__getScene === "function" ? window.__getScene() : "menu";

      if (pauseActive) {
        const context = getActiveKeyboardContext();
        const horizontal = isHorizontalKeyboardContext(context);

        if (event.code === "Escape") {
          if (typeof window.__resumeGameFromPause === "function") {
            window.__resumeGameFromPause();
          }
          pauseScreen.hidden = true;
          event.preventDefault();
          return;
        }

        if (isSelectionKey(event, horizontal)) {
          const delta = getSelectionDelta(event, horizontal);
          if (delta !== 0) {
            moveKeyboardSelection(delta);
          }
          event.preventDefault();
          return;
        }

        if (event.code === "Enter" || event.code === "Space") {
          activateKeyboardSelection();
          event.preventDefault();
        }
        return;
      }

      if (resultActive) {
        const context = getActiveKeyboardContext();
        const horizontal = isHorizontalKeyboardContext(context);

        if (event.code === "Escape") {
          resultScreen.hidden = true;
          window.__resultOverlayActive = false;
          if (typeof window.__returnToMenu === "function") {
            window.__returnToMenu();
          }
          showMenu();
          event.preventDefault();
          return;
        }

        if (isSelectionKey(event, horizontal)) {
          const delta = getSelectionDelta(event, horizontal);
          if (delta !== 0) {
            moveKeyboardSelection(delta);
          }
          event.preventDefault();
          return;
        }

        if (event.code === "Enter" || event.code === "Space") {
          activateKeyboardSelection();
          event.preventDefault();
        }
        return;
      }

      if (pageActive) {
        const context = getActiveKeyboardContext();
        const horizontal = isHorizontalKeyboardContext(context);

        if (event.code === "Escape") {
          if (currentPageKey === "exit") {
            const noButton = pageBody.querySelector(".terminal-exit-no");
            if (noButton) {
              activateTerminalButton(noButton);
            } else {
              showMenu();
            }
          } else {
            showMenu();
          }
          event.preventDefault();
          return;
        }

        if (isSelectionKey(event, horizontal)) {
          const delta = getSelectionDelta(event, horizontal);
          if (delta !== 0) {
            moveKeyboardSelection(delta);
          }
          event.preventDefault();
          return;
        }

        if (event.code === "Enter" || event.code === "Space") {
          activateKeyboardSelection();
          event.preventDefault();
        }
        return;
      }

      if (sceneValue === "game" && event.code === "Escape" && !event.repeat) {
        if (typeof window.__toggleGamePause === "function") {
          window.__toggleGamePause();
        }
        event.preventDefault();
        return;
      }

      if (sceneValue !== "menu") {
        return;
      }

      if (menuActivationPending) {
        event.preventDefault();
        return;
      }

      if (event.code === "ArrowUp" || event.code === "KeyW") {
        selectMenu(-1);
        syncKeyboardSelection();
        event.preventDefault();
      }

      if (event.code === "ArrowDown" || event.code === "KeyS") {
        selectMenu(1);
        syncKeyboardSelection();
        event.preventDefault();
      }

      if (event.code === "Enter" || event.code === "Space") {
        const button = menuButtons[selectedIndex];
        activateTerminalButton(button);
        event.preventDefault();
      }
    });

    syncMobileShellLayout();
    window.addEventListener("resize", scheduleLayoutUpdate);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", scheduleLayoutUpdate);
      window.visualViewport.addEventListener("scroll", scheduleLayoutUpdate);
    }
    if (document.fonts && document.fonts.ready && typeof document.fonts.ready.then === "function") {
      document.fonts.ready.then(() => {
        scheduleLayoutUpdate();
      });
    }

    showMenu();

    const sceneSync = window.setInterval(() => {
      if (typeof window.__getScene !== "function") {
        return;
      }

      const gameScene = window.__getScene();

      if (gameScene === "menu") {
        if (uiRoot.hidden) {
          uiRoot.hidden = false;
          showMenu();
        }
        setMobileControlsVisible(false);
        resetMobileJoystick();
        resetMobileFire();
        setDomMenuActive(true);
        return;
      }

      if (window.__resultOverlayActive) {
        if (uiRoot.hidden) {
          uiRoot.hidden = false;
        }
        pauseScreen.hidden = true;
        scheduleLayoutUpdate();
        setMobileControlsVisible(false);
        resetMobileJoystick();
        resetMobileFire();
        setDomMenuActive(true);
        return;
      }

      const pauseActive = typeof window.__isGamePaused === "function" && window.__isGamePaused();
      pauseScreen.hidden = !(gameScene === "game" && pauseActive);

      if (gameScene === "game" && pauseActive) {
        if (uiRoot.hidden) {
          uiRoot.hidden = false;
        }
        scheduleLayoutUpdate();
        syncKeyboardSelection();
        setMobileControlsVisible(false);
        resetMobileJoystick();
        resetMobileFire();
        setDomMenuActive(false);
        return;
      }

      if (gameScene === "game") {
        menuScreen.hidden = true;
        pageScreen.hidden = true;
        resultScreen.hidden = true;
      }

      setMobileControlsVisible(isTouchInterface && gameScene === "game");

      if (isTouchInterface && gameScene === "game") {
        if (uiRoot.hidden) {
          uiRoot.hidden = false;
        }
      } else if (!uiRoot.hidden) {
        uiRoot.hidden = true;
      }
      setDomMenuActive(false);
    }, 100);

    window.addEventListener("beforeunload", () => {
      window.clearInterval(sceneSync);
    });
  </script>
</body>
</html>
