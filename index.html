<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cyber Spider Shooter</title>
  <style>
    @font-face {
      font-family: "BoldPixels";
      src: url("assets/fonts/BoldPixels-v1.6-Font/BoldPixels.ttf") format("truetype");
      font-display: swap;
    }

    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap");

    :root {
      color-scheme: dark;
      --bg: #05070b;
      --panel: #0d121a;
      --panel-2: #151c27;
      --line: rgba(117, 162, 218, 0.32);
      --line-strong: rgba(104, 208, 255, 0.62);
      --text: #eef4ff;
      --muted: #98a8be;
      --accent: #68d0ff;
      --accent-2: #a1ff73;
      --shadow: rgba(0, 0, 0, 0.55);
      --menu-button-width: min(340px, calc(100vw - 32px));
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      position: relative;
      font-family: "Orbitron", "Rajdhani", "Bahnschrift", "Segoe UI Semibold", sans-serif;
      color: var(--text);
    }

    body.menu-screen {
      background:
        url("assets/ui/111.png") center center / cover no-repeat,
        var(--bg);
    }

    body.menu-screen::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(3, 6, 10, 0.28);
      pointer-events: none;
      z-index: 1;
    }

    canvas {
      display: block;
      position: fixed;
      left: 0;
      top: 0;
      background: #050510;
    }

    .ui-root {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 4;
    }

    .ui-root[hidden] {
      display: none !important;
    }

    .menu-buttons[hidden],
    .page-shell[hidden] {
      display: none !important;
    }

    .page-header[hidden] {
      display: none !important;
    }

    .menu-buttons,
    .page-shell {
      pointer-events: auto;
    }

    .menu-buttons {
      position: fixed;
      left: 50%;
      top: 41%;
      transform: translate(-50%, -50%);
      width: var(--menu-button-width);
      z-index: 4;
    }

    .menu-brand {
      position: absolute;
      left: 50%;
      bottom: 100%;
      width: min(620px, 92vw);
      margin-bottom: 34px;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      user-select: none;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.88);
    }

    .menu-brand__title {
      display: block;
      font-family: "BoldPixels", "Orbitron", "Rajdhani", sans-serif;
      font-size: clamp(28px, 3.4vw, 48px);
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .menu-brand__stars {
      font-family: "Orbitron", "Rajdhani", sans-serif;
      font-size: clamp(12px, 1.35vw, 18px);
      font-weight: 700;
      letter-spacing: 0.42em;
      line-height: 1;
      color: #ff2a2a;
      text-shadow:
        0 0 10px rgba(255, 0, 0, 0.55),
        0 0 22px rgba(255, 48, 48, 0.32);
    }

    .menu-brand__rule {
      width: min(220px, 44vw);
      margin: 14px auto 0;
      border-bottom: 1px solid #ff1f1f;
      opacity: 1;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
    }

    .menu-brand__stars--top {
      display: none;
    }

    .menu-brand__rule {
      display: block;
    }

    .menu-brand__stars--bottom {
      margin-top: 8px;
      display: block;
    }

    .menu-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .menu-button {
      font-family: "BoldPixels", "Orbitron", "Rajdhani", sans-serif;
      width: var(--menu-button-width);
      aspect-ratio: 1217 / 154;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      background:
        url("assets/ui/menu_button_01.png") center center / 100% 100% no-repeat;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.72);
      overflow: visible;
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
      filter: brightness(1) saturate(1);
    }

    .menu-button span {
      position: relative;
      z-index: 1;
      display: inline-block;
      transform: translateY(4px);
    }

    .menu-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 6.5% 51%, rgba(255, 98, 40, 0.38), transparent 6%),
        radial-gradient(circle at 93.5% 51%, rgba(255, 98, 40, 0.38), transparent 6%);
      opacity: 0.72;
      pointer-events: none;
      mix-blend-mode: screen;
      transition: opacity 120ms ease, background 120ms ease;
    }

    .menu-button:hover,
    .menu-button:focus-visible {
      outline: none;
      color: #ffffff;
      transform: translateY(-1px);
      filter: brightness(1.06) saturate(1.08);
      box-shadow:
        0 0 0 1px rgba(255, 96, 52, 0.06) inset,
        0 0 8px rgba(255, 96, 52, 0.08);
    }

    .menu-button:hover::before,
    .menu-button:focus-visible::before {
      opacity: 1;
      background:
        radial-gradient(circle at 6.5% 51%, rgba(255, 128, 72, 0.5), transparent 6%),
        radial-gradient(circle at 93.5% 51%, rgba(255, 128, 72, 0.5), transparent 6%);
    }

    .menu-button.is-clicked {
      outline: none;
      color: #ff2f2f;
      transform: translateY(-1px);
      filter: brightness(1.17) saturate(1.22);
      box-shadow:
        0 0 0 1px rgba(255, 102, 56, 0.18) inset,
        0 0 24px rgba(255, 86, 40, 0.22),
        0 0 10px rgba(255, 66, 28, 0.12);
    }

    .menu-button.is-clicked::before {
      opacity: 1;
      background:
        radial-gradient(circle at 6.5% 51%, rgba(255, 152, 92, 0.72), transparent 6%),
        radial-gradient(circle at 93.5% 51%, rgba(255, 152, 92, 0.72), transparent 6%);
    }

    .page-shell {
      display: grid;
      gap: 18px;
      padding: 18px;
    }

    .settings-shell,
    .terminal-shell {
      width: min(1120px, calc(100vw - 48px));
      aspect-ratio: 1536 / 1024;
      margin: 0 auto;
      padding: clamp(72px, 5.5vw, 90px) clamp(110px, 8vw, 140px) clamp(66px, 5vw, 84px);
      display: grid;
      grid-template-rows: 20% 55% 25%;
      background: url("assets/ui/panel.png") center center / 100% 100% no-repeat;
      box-sizing: border-box;
    }

    .settings-shell__header,
    .terminal-shell__header {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-shell__title,
    .terminal-shell__title {
      font-family: "BoldPixels", "Orbitron", "Rajdhani", sans-serif;
      font-size: clamp(24px, 2.2vw, 34px);
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
    }

    .settings-shell__content,
    .terminal-shell__content {
      display: grid;
      align-content: center;
      gap: clamp(18px, 2.2vw, 28px);
      justify-items: center;
      padding-bottom: clamp(10px, 1.5vw, 18px);
      box-sizing: border-box;
    }

    .settings-stack,
    .terminal-stack {
      display: grid;
      gap: 12px;
      justify-items: center;
      width: min(100%, 720px);
    }

    .settings-button,
    .terminal-button {
      width: min(100%, 540px);
    }

    .settings-back,
    .terminal-back {
      width: min(360px, 66%);
      margin-top: 0;
    }

    .settings-shell__footer,
    .terminal-shell__footer {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .terminal-shell--leaders .terminal-shell__content,
    .terminal-shell--titles .terminal-shell__content,
    .terminal-shell--results .terminal-shell__content {
      align-content: stretch;
    }

    .terminal-shell--catalog .terminal-shell__content {
      align-content: start;
      padding-top: clamp(8px, 1vw, 14px);
    }

    .terminal-shell--results {
      grid-template-rows: 14% 66% 20%;
    }

    .terminal-shell--results .terminal-shell__content {
      align-content: start;
      overflow: hidden;
      padding-top: clamp(6px, 0.8vw, 12px);
    }

    .terminal-leaders__table,
    .terminal-titles__text,
    .terminal-results__stack {
      width: min(100%, 760px);
    }

    .terminal-leaders__table {
      display: grid;
      gap: 8px;
    }

    .terminal-leaders__row {
      min-height: 42px;
      padding-block: 8px;
    }

    .terminal-titles__text {
      display: grid;
      gap: 14px;
      justify-items: center;
      align-content: center;
      min-height: 100%;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .terminal-results__stack {
      display: grid;
      gap: 12px;
      align-content: start;
      min-height: 0;
    }

    .terminal-results__layout {
      width: min(100%, 860px);
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .terminal-results__summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .terminal-results__metric {
      min-height: 80px;
      display: grid;
      gap: 4px;
      padding: 10px 10px 8px;
      border: 1px solid rgba(117, 162, 218, 0.16);
      background: linear-gradient(180deg, rgba(16, 22, 31, 0.86), rgba(21, 29, 40, 0.96));
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
      align-content: center;
    }

    .terminal-results__metric-label {
      color: var(--accent);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
    }

    .terminal-results__metric-value {
      color: var(--text);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 15px;
      font-weight: 700;
    }

    .terminal-results__metric-value--grade {
      font-size: 20px;
    }

    .terminal-results__two-col {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 12px;
    }

    .terminal-results__panel {
      display: grid;
      gap: 8px;
      padding: 10px 12px 12px;
      border: 1px solid rgba(117, 162, 218, 0.16);
      background: linear-gradient(180deg, rgba(16, 22, 31, 0.86), rgba(21, 29, 40, 0.96));
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    }

    .terminal-results__panel-title {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
    }

    .terminal-results__reasons {
      display: grid;
      gap: 6px;
    }

    .terminal-results__reason {
      padding: 8px 10px;
      border: 1px solid rgba(117, 162, 218, 0.16);
      background: linear-gradient(180deg, rgba(29, 38, 51, 0.92), rgba(18, 24, 33, 0.92));
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
      color: var(--text);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 11px;
    }

    .terminal-results__comment {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      line-height: 1.4;
      font-size: 11px;
      text-align: center;
      padding: 0 4px;
    }

    .terminal-results__comment strong {
      color: var(--text);
      font-weight: 700;
    }

    .terminal-results__result-summary {
      display: grid;
      gap: 8px;
    }

    .terminal-results__result-lead {
      color: var(--text);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      line-height: 1.55;
      font-size: 12px;
    }

    .terminal-results__result-threats {
      display: grid;
      gap: 6px;
    }

    .terminal-results__result-threat {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid rgba(117, 162, 218, 0.16);
      background: linear-gradient(180deg, rgba(29, 38, 51, 0.92), rgba(18, 24, 33, 0.92));
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 11px;
    }

    .terminal-results__result-threat-index {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.18em;
    }

    .terminal-results__result-threat-text {
      color: var(--text);
      text-align: left;
    }

    .terminal-results__panel--wide {
      width: 100%;
    }

    .terminal-results__detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
    }

    .terminal-results__detail-column {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .terminal-results__detail-group {
      display: grid;
      gap: 8px;
      padding: 10px 12px 12px;
      border: 1px solid rgba(117, 162, 218, 0.16);
      background: linear-gradient(180deg, rgba(16, 22, 31, 0.86), rgba(21, 29, 40, 0.96));
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    }

    .terminal-results__detail-title {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
    }

    .terminal-results__detail-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .terminal-results__detail-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 6px 8px;
      border: 1px solid rgba(117, 162, 218, 0.12);
      background: rgba(11, 16, 24, 0.28);
      clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
    }

    .terminal-results__detail-label,
    .terminal-results__detail-value {
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 11px;
      line-height: 1.35;
    }

    .terminal-results__detail-label {
      color: var(--muted);
    }

    .terminal-results__detail-value {
      color: var(--text);
      text-align: right;
      font-weight: 700;
    }

    .terminal-results__detail-value--accent {
      color: #ff7d58;
      text-shadow: 0 0 10px rgba(255, 117, 72, 0.28);
    }

    .terminal-results__detail-grid--single {
      grid-template-columns: 1fr;
    }

    @media (max-width: 900px) {
      .terminal-results__summary,
      .terminal-results__detail-grid {
        grid-template-columns: 1fr;
      }

      .terminal-results__detail-list {
        grid-template-columns: 1fr;
      }
    }

    .terminal-results__block {
      display: grid;
      gap: 8px;
    }

    .terminal-results__label {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
    }

    .terminal-results__value {
      padding: 16px 18px;
      border: 1px solid rgba(117, 162, 218, 0.16);
      background: linear-gradient(180deg, rgba(29, 38, 51, 0.92), rgba(18, 24, 33, 0.92));
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
      color: var(--text);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      min-height: 64px;
      display: grid;
      place-items: center;
    }

    .terminal-controls__list {
      width: min(100%, 760px);
      display: grid;
      gap: 16px;
      align-content: center;
    }

    .terminal-controls__group {
      display: grid;
      gap: 8px;
    }

    .terminal-controls__label {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
    }

    .terminal-controls__value {
      padding: 16px 18px;
      border: 1px solid rgba(117, 162, 218, 0.16);
      background: linear-gradient(180deg, rgba(29, 38, 51, 0.92), rgba(18, 24, 33, 0.92));
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
      color: var(--text);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      min-height: 54px;
      display: grid;
      place-items: center;
    }

    .terminal-controls__value--small {
      min-height: 0;
      padding-block: 10px;
      display: block;
    }

    .terminal-controls__value--stacked {
      gap: 8px;
      place-items: stretch;
      text-align: left;
    }

    .terminal-controls__debug-line {
      text-align: center;
    }

    .terminal-catalog__grid {
      width: min(100%, 900px);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-content: start;
    }

    .terminal-catalog__item {
      min-height: 96px;
      display: grid;
      gap: 8px;
      padding: 12px 14px;
      border: 1px solid rgba(117, 162, 218, 0.16);
      background: linear-gradient(180deg, rgba(16, 22, 31, 0.86), rgba(21, 29, 40, 0.96));
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    }

    .terminal-catalog__label {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
    }

    .terminal-catalog__sample {
      display: grid;
      place-items: center;
      min-height: 52px;
    }

    .terminal-catalog__sample--header {
      font-family: "BoldPixels", "Orbitron", sans-serif;
      font-size: clamp(16px, 1.4vw, 22px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .terminal-catalog__sample--smallbutton {
      width: min(100%, 280px);
      transform: scale(0.72);
      transform-origin: center;
    }

    .terminal-catalog__sample--list {
      width: 100%;
      display: grid;
      gap: 6px;
    }

    .terminal-catalog__sample--list .page-row {
      padding: 8px 10px;
      font-size: 11px;
    }

    .terminal-catalog__sample--stats {
      width: 100%;
      display: grid;
      gap: 6px;
    }

    .terminal-catalog__stat {
      padding: 10px 12px;
      border: 1px solid rgba(117, 162, 218, 0.16);
      background: linear-gradient(180deg, rgba(29, 38, 51, 0.92), rgba(18, 24, 33, 0.92));
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 11px;
      color: var(--text);
    }

    .terminal-catalog__sample--credits {
      display: grid;
      gap: 6px;
      text-align: center;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 11px;
      line-height: 1.5;
    }

    .terminal-catalog__toggle {
      width: min(100%, 210px);
      padding: 10px 12px;
      border: 1px solid rgba(117, 162, 218, 0.16);
      background: linear-gradient(180deg, rgba(29, 38, 51, 0.92), rgba(18, 24, 33, 0.92));
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 11px;
    }

    .terminal-catalog__toggle-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff6a28;
      box-shadow: 0 0 10px rgba(255, 110, 40, 0.55);
    }

    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(117, 162, 218, 0.16);
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .page-title {
      font-family: "BoldPixels", "Orbitron", "Rajdhani", sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }

    .page-tag {
      font-size: 10px;
      color: var(--accent);
    }

    .page-body {
      display: grid;

          </div>
        `;
      }

      return "";
    }

    function renderPage(key) {
      const page = pages[key];
      if (!page) {
        return;
      }

      pageHeader.hidden = ["settings", "controls", "catalog", "leaders", "titles", "results"].includes(key);
      pageTitle.textContent = page.title;
      pageTag.textContent = ["settings", "controls", "catalog", "leaders", "titles", "results"].includes(key) ? "" : page.tag;

      if (["settings", "controls", "catalog", "leaders", "titles", "results"].includes(key)) {
        pageBody.innerHTML = renderShellPage(key);
        pageActions.innerHTML = "";
        const backButton = pageBody.querySelector(".terminal-back");
        if (backButton) {
          const backTarget = key === "controls" ? "settings" : "menu";
          bindTerminalAction(backButton, () => {
            if (backTarget === "settings") {
              showPage("settings");
              return;
            }
            showMenu();
          });
        }

        if (key === "settings") {
          const settingsButtons = pageBody.querySelectorAll(".settings-button");
          if (settingsButtons[0]) {
            bindTerminalAction(settingsButtons[0], () => showPage("controls"));
          }
        }
        return;
      }

      pageBody.innerHTML = page.body.map((line) => `<div class="page-row">${line}</div>`).join("");
      pageActions.innerHTML = "";

      for (const item of page.actions) {
        const button = document.createElement("button");
        button.className = "page-button";
        button.type = "button";
        button.textContent = item.label;
        button.dataset.action = item.action;
        bindTerminalAction(button, () => onPageActionClick({ currentTarget: button }));
        pageActions.appendChild(button);
      }
    }

    function formatResultThreatLabel(reason) {
      if (!reason) {
        return "-";
      }

      const friendlyLabelMap = {
        "Снаряд врага": "Снаряды врага",
        "Удар дрона": "Удары дрона",
        "Осколки": "Осколки",
        "Лапа босса": "Лапы босса",
        "Ракета танка": "Ракеты танков",
        "Опасная зона": "Опасные зоны"
      };

      if (typeof reason === "string") {
        return friendlyLabelMap[reason] || reason;
      }

      const label = friendlyLabelMap[reason.reason] || reason.reason || "-";
      const count = Number.isFinite(reason.count) ? reason.count : null;

      return count !== null ? `${label} ×${count}` : label;
    }

    function formatResultDamageValue(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) {
        return value ?? "-";
      }

      return numeric.toFixed(1).replace(/\.0$/, "");
    }

    function renderResultRows() {
      if (!currentResultData) {
        resultBody.innerHTML = "";
        resultActions.innerHTML = "";
        return;
      }

      const summaryRows = [
        { label: "ОЦЕНКА", value: currentResultData.grade?.label || "-", grade: true },
        { label: "ОЧКИ", value: currentResultData.score ?? 0 },
        { label: "ВРЕМЯ", value: currentResultData.missionTimeText || "-" },
        { label: "УНИЧТОЖЕНО", value: Number.isFinite(currentResultData.destroyedTotal) ? currentResultData.destroyedTotal : "-" },
        { label: "БОСС", value: currentResultData.bossAppeared ? "ДА" : "НЕТ" }
      ];

      const threatReasons = (currentResultData.threatReasons || currentResultData.failureReasons || [])
        .filter(Boolean)
        .slice(0, 3)
        .map(formatResultThreatLabel);

      const summaryLead = currentResultData.outcome === "victory"
        ? "ПОБЕДА ПОДТВЕРЖДЕНА. ОСНОВНЫЕ УГРОЗЫ ЗАБЕГА:"
        : "ПРИЧИНЫ ПОРАЖЕНИЯ:";

      const summaryThreatsMarkup = threatReasons.length > 0
        ? threatReasons.map((reason, index) => `
            <div class="terminal-results__result-threat">
              <div class="terminal-results__result-threat-index">${String(index + 1).padStart(2, "0")}</div>
              <div class="terminal-results__result-threat-text">${reason}</div>
            </div>
          `).join("")
        : `<div class="terminal-results__result-threat">
            <div class="terminal-results__result-threat-index">--</div>
            <div class="terminal-results__result-threat-text">НЕТ ДАННЫХ О ЯВНЫХ УГРОЗАХ</div>
          </div>`;

      const destroyedStats = currentResultData.destroyedStats || {};
      const damageStats = currentResultData.damageStats || {};
      const threatStats = currentResultData.threatStats || {};
      const commentText = currentResultData.comment || "-";

      if (resultDetailsExpanded) {
        const detailGroups = [
          {
            title: "УНИЧТОЖЕНО",
            rows: [
              { label: "Тараны", value: destroyedStats.normal ?? "-" },
              { label: "Паучки", value: destroyedStats.web ?? "-" },
              { label: "Зигзаги", value: destroyedStats.zigzag ?? "-" },
              { label: "Танки", value: destroyedStats.tank ?? "-" },
              { label: "Лапы босса", value: destroyedStats.bossLeg ?? "-" }
            ]
          },
          {
            title: "БОСС",
            rows: [
              { label: "Уничтожен", value: currentResultData.bossDefeated ? "ДА" : "НЕТ", accent: true }
            ]
          },
          {
            title: "ПОЛУЧЕННЫЙ УРОН",
            rows: [
              { label: "Попаданий", value: damageStats.hits ?? currentResultData.hitsText ?? "-" },
              { label: "Получено урона", value: formatResultDamageValue(damageStats.damageTaken ?? currentResultData.totalDamageText) },
              { label: "Замедлений", value: damageStats.slows ?? "-" }
            ]
          },
          {
            title: "ОПАСНОСТИ",
            rows: [
              { label: "Ракеты танков", value: Number.isFinite(threatStats.tankMissilesLaunched) ? threatStats.tankMissilesLaunched : "-" },
              { label: "Опасные зоны", value: Number.isFinite(threatStats.enemyHazardZonesSpawned) || Number.isFinite(threatStats.bossDangerZonesSpawned)
                ? (Number(threatStats.enemyHazardZonesSpawned || 0) + Number(threatStats.bossDangerZonesSpawned || 0))
                : "-" },
              { label: "Время на критическом HP", value: currentResultData.criticalTimeText || "-" }
            ]
          }
        ];
        const detailColumns = [
          [detailGroups[0], detailGroups[2]],
          [detailGroups[1], detailGroups[3]]
        ];

        resultBody.innerHTML = `
          <div class="terminal-results__layout">
            <div class="terminal-results__summary">
              ${summaryRows.map((row) => `
                <div class="terminal-results__metric">
                  <div class="terminal-results__metric-label">${row.label}</div>
                  <div class="terminal-results__metric-value${row.grade ? " terminal-results__metric-value--grade" : ""}">${row.value}</div>
                </div>
              `).join("")}
            </div>
            <div class="terminal-results__detail-grid">
              ${detailColumns.map((column) => `
                <div class="terminal-results__detail-column">
                  ${column.map((group) => `
                    <section class="terminal-results__detail-group">
                      <div class="terminal-results__detail-title">${group.title}</div>
                      <div class="terminal-results__detail-list">
                        ${group.rows.map((row) => `
                          <div class="terminal-results__detail-row">
                            <div class="terminal-results__detail-label">${row.label}</div>
                            <div class="terminal-results__detail-value${row.accent ? " terminal-results__detail-value--accent" : ""}">${row.value}</div>
                          </div>
                        `).join("")}
                      </div>
                    </section>
                  `).join("")}
                </div>
              `).join("")}
            </div>
          </div>
        `;
      } else {
        resultBody.innerHTML = `
          <div class="terminal-results__layout">
            <div class="terminal-results__summary">
              ${summaryRows.map((row) => `
                <div class="terminal-results__metric">
                  <div class="terminal-results__metric-label">${row.label}</div>
                  <div class="terminal-results__metric-value${row.grade ? " terminal-results__metric-value--grade" : ""}">${row.value}</div>
                </div>
              `).join("")}
            </div>
            <section class="terminal-results__result-summary terminal-results__panel terminal-results__panel--wide">
              <div class="terminal-results__panel-title">ИТОГ ЗАБЕГА</div>
              <div class="terminal-results__result-lead">${summaryLead}</div>
              <div class="terminal-results__result-threats">
                ${summaryThreatsMarkup}
              </div>
            </section>
            <section class="terminal-results__panel terminal-results__panel--wide">
              <div class="terminal-results__panel-title">КОММЕНТАРИЙ ЗАБЕГА</div>
              <div class="terminal-results__comment">${commentText}</div>
            </section>
          </div>
        `;
      }

      resultActions.innerHTML = "";

      const actions = [
        {
          label: resultDetailsExpanded ? "СВЕРНУТЬ" : "ПОДРОБНЕЕ",
          action: "toggleDetails"
        },
        {
          label: "ИГРАТЬ СНОВА",
          action: "restart"
        },
        {
          label: "В МЕНЮ",
          action: "menu"
        }
      ];

      for (const item of actions) {
        const button = document.createElement("button");
        button.className = "result-action-button";
        button.type = "button";
        button.innerHTML = `<span>${item.label}</span>`;
        button.dataset.action = item.action;
        button.addEventListener("click", onResultActionClick);
        resultActions.appendChild(button);
      }
    }

    function showMenu() {
      view = "menu";
      menuActivationPending = false;
      if (menuActivationTimer !== null) {
        window.clearTimeout(menuActivationTimer);
        menuActivationTimer = null;
      }
      menuButtons.forEach((button) => {
        button.classList.remove("is-clicked");
      });
      pageBody.querySelectorAll(".is-clicked").forEach((button) => {
        button.classList.remove("is-clicked");
      });
      if (pageHeader) {
        pageHeader.hidden = false;
      }
      menuScreen.hidden = false;
      pageScreen.hidden = true;
      resultScreen.hidden = true;
      window.__resultOverlayActive = false;
      setDomMenuActive(true);
      uiRoot.setAttribute("aria-label", "Главное меню");
    }

    function showPage(key) {
      view = key;
      renderPage(key);
      menuScreen.hidden = true;
      pageScreen.hidden = false;
      resultScreen.hidden = true;
      setDomMenuActive(true);
      uiRoot.setAttribute("aria-label", pages[key].title);
    }

    function selectMenu(delta) {
      if (menuActivationPending) {
        return;
      }
      selectedIndex = (selectedIndex + delta + mainMenuOrder.length) % mainMenuOrder.length;
    }

    function activateMenuSelection(action, button) {
      if (action === "play") {
        setDomMenuActive(false);
        menuScreen.hidden = true;
        pageScreen.hidden = true;
        uiRoot.hidden = true;
        if (typeof window.__startGameFromMenu === "function") {
          window.__startGameFromMenu();
        }
        return;
      }

      showPage(action);
    }

    function showResult(data) {
      currentResultData = data;
      resultDetailsExpanded = false;
      window.__resultOverlayActive = true;
      view = "result";
      uiRoot.hidden = false;
      menuScreen.hidden = true;
      pageScreen.hidden = true;
      resultScreen.hidden = false;
      resultTitle.textContent = "РЕЗУЛЬТАТЫ";
      renderResultRows();
      setDomMenuActive(true);
      uiRoot.setAttribute("aria-label", data.outcome === "victory" ? "Победа" : "Поражение");
      window.requestAnimationFrame(() => {
        const firstAction = resultActions.querySelector("button");
        if (firstAction) {
          firstAction.focus({ preventScroll: true });
        }
      });
    }

    function onPageActionClick(event) {
      const action = event.currentTarget.dataset.action;
      if (!action) {
        return;
      }

      if (action === "back") {
        showMenu();
      }

      if (action === "close") {
        window.close();
      }
    }

    function onResultActionClick(event) {
      const action = event.currentTarget.dataset.action;

      if (action === "toggleDetails") {
        resultDetailsExpanded = !resultDetailsExpanded;
        renderResultRows();
        return;
      }

      if (action === "restart") {
        resultScreen.hidden = true;
        window.__resultOverlayActive = false;
        uiRoot.hidden = true;
        if (typeof window.__startGameFromMenu === "function") {
          window.__startGameFromMenu();
        }
        return;
      }

      if (action === "menu") {
        resultScreen.hidden = true;
        window.__resultOverlayActive = false;
        showMenu();
      }
    }

    menuButtons.forEach((button, index) => {
      bindTerminalAction(button, () => {
        selectedIndex = index;
        activateMenuSelection(mainMenuOrder[selectedIndex], button);
      });
    });

    window.__showRunResult = function showRunResult(data) {
      currentResultData = data;
      showResult(data);
    };

    window.__hideRunResult = function hideRunResult() {
      currentResultData = null;
      window.__resultOverlayActive = false;
      resultScreen.hidden = true;
    };

    window.addEventListener("keydown", (event) => {
      if (window.__getScene && window.__getScene() !== "menu") {
        return;
      }

      if (view !== "menu" && event.code === "Escape") {
        showMenu();
        event.preventDefault();
        return;
      }

      if (view !== "menu") {
        return;
      }

      if (menuActivationPending) {
        event.preventDefault();
        return;
      }

      if (event.code === "ArrowUp" || event.code === "KeyW") {
        selectMenu(-1);
        event.preventDefault();
      }

      if (event.code === "ArrowDown" || event.code === "KeyS") {
        selectMenu(1);
        event.preventDefault();
      }

      if (event.code === "Enter") {
        activateMenuSelection(mainMenuOrder[selectedIndex], menuButtons[selectedIndex]);
        event.preventDefault();
      }
    });

    showMenu();

    const sceneSync = window.setInterval(() => {
      if (typeof window.__getScene !== "function") {
        return;
      }

      const gameScene = window.__getScene();

      if (gameScene === "menu") {
        if (uiRoot.hidden) {
          uiRoot.hidden = false;
          showMenu();
        }
        setDomMenuActive(true);
        return;
      }

      if (window.__resultOverlayActive) {
        if (uiRoot.hidden) {
          uiRoot.hidden = false;
        }
        setDomMenuActive(true);
        return;
      }

      if (!uiRoot.hidden) {
        uiRoot.hidden = true;
      }
      setDomMenuActive(false);
    }, 100);

    window.addEventListener("beforeunload", () => {
      window.clearInterval(sceneSync);
    });
  </script>
</body>
</html>
